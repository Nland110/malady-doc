<title>MALADY Item Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  :root {
    --bg: #EFF1EA; --panel: #E6E9DE; --panel2: #DDE1D2;
    --ink: #242A20; --ink-soft: #5A6152; --ink-faint: #8A9180;
    --accent: #55712E; --accent-ink: #F2F5EA;
    --line: #C9CEBB; --link: #4A6528;
    --warn: #96382E; --warn-bg: #EAD9D4;
    --live: #2E6047; --live-bg: #D6E4DA;
    --edit: #8A6A1F; --edit-bg: #EEE4C8;
    --t0: #8A9180; --t1: #9A6B3F; --t2: #5B7186; --t3: #77862F;
    --card: #F6F7F1; --shadow: 0 1px 2px rgba(30,40,20,.10);
  }
  @media (prefers-color-scheme: dark) { :root {
    --bg: #171B16; --panel: #1E241C; --panel2: #242B21;
    --ink: #D9DECD; --ink-soft: #9BA38E; --ink-faint: #6E7663;
    --accent: #9AB86A; --accent-ink: #1A2112;
    --line: #333B2E; --link: #A7C47B;
    --warn: #D08A7E; --warn-bg: #3A2723;
    --live: #8FC0A5; --live-bg: #223A2D;
    --edit: #D4B565; --edit-bg: #3A3120;
    --t0: #7C8A6E; --t1: #C09468; --t2: #8FA6BC; --t3: #B0C05C;
    --card: #20261D; --shadow: 0 1px 3px rgba(0,0,0,.35);
  } }
  :root[data-theme="dark"] {
    --bg: #171B16; --panel: #1E241C; --panel2: #242B21;
    --ink: #D9DECD; --ink-soft: #9BA38E; --ink-faint: #6E7663;
    --accent: #9AB86A; --accent-ink: #1A2112;
    --line: #333B2E; --link: #A7C47B;
    --warn: #D08A7E; --warn-bg: #3A2723;
    --live: #8FC0A5; --live-bg: #223A2D;
    --edit: #D4B565; --edit-bg: #3A3120;
    --t0: #7C8A6E; --t1: #C09468; --t2: #8FA6BC; --t3: #B0C05C;
    --card: #20261D; --shadow: 0 1px 3px rgba(0,0,0,.35);
  }
  :root[data-theme="light"] {
    --bg: #EFF1EA; --panel: #E6E9DE; --panel2: #DDE1D2;
    --ink: #242A20; --ink-soft: #5A6152; --ink-faint: #8A9180;
    --accent: #55712E; --accent-ink: #F2F5EA;
    --line: #C9CEBB; --link: #4A6528;
    --warn: #96382E; --warn-bg: #EAD9D4;
    --live: #2E6047; --live-bg: #D6E4DA;
    --edit: #8A6A1F; --edit-bg: #EEE4C8;
    --t0: #8A9180; --t1: #9A6B3F; --t2: #5B7186; --t3: #77862F;
    --card: #F6F7F1; --shadow: 0 1px 2px rgba(30,40,20,.10);
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font: 15px/1.55 "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  code, .id { font-family: Consolas, "Courier New", monospace; font-size: .85em; color: var(--ink-soft); }

  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 20px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header h1 {
    margin: 0; font-family: Georgia, "Palatino Linotype", serif;
    font-size: 21px; font-weight: 700; letter-spacing: .04em;
  }
  header h1 a { color: var(--ink); }
  header h1 .malady { color: var(--accent); text-transform: uppercase; }
  .tagline { color: var(--ink-soft); font-size: 13px; }
  .headright { margin-left: auto; display: flex; gap: 8px; align-items: center; color: var(--ink-faint); font-size: 12.5px; font-variant-numeric: tabular-nums; }

  .btn {
    display: inline-block; cursor: pointer; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); border-radius: 4px;
    font: inherit; font-size: 13px; padding: 4px 12px;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
  .btn.danger { color: var(--warn); }
  .btn.mini { font-size: 12px; padding: 2px 9px; }

  .frame { display: flex; flex: 1; min-height: 0; }
  nav {
    width: 265px; flex: none; border-right: 1px solid var(--line);
    background: var(--panel); overflow-y: auto; padding: 12px;
  }
  main { flex: 1; overflow-y: auto; padding: 22px 28px 60px; }
  .inner { max-width: 880px; }

  #search {
    width: 100%; padding: 7px 10px; margin-bottom: 12px;
    border: 1px solid var(--line); border-radius: 4px;
    background: var(--card); color: var(--ink); font: inherit; font-size: 14px;
  }
  .navgroup { margin-bottom: 4px; }
  .navgroup > button {
    all: unset; cursor: pointer; display: flex; width: 100%; align-items: center;
    padding: 5px 6px; border-radius: 4px; font-size: 13px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase; color: var(--ink-soft);
  }
  .navgroup > button:hover { background: var(--panel2); }
  .navgroup .n { margin-left: auto; color: var(--ink-faint); font-weight: 400; font-variant-numeric: tabular-nums; }
  .navlist { list-style: none; margin: 0 0 6px; padding: 0 0 0 8px; }
  .navlist a {
    display: flex; gap: 6px; align-items: baseline; padding: 2.5px 6px;
    border-radius: 4px; color: var(--ink); font-size: 13.5px;
  }
  .navlist a:hover { background: var(--panel2); text-decoration: none; }
  .navlist a.active { background: var(--accent); color: var(--accent-ink); }
  .navlist .dotlive { width: 6px; height: 6px; border-radius: 50%; background: var(--live); flex: none; align-self: center; }

  .crumb { font-size: 12.5px; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
  h2.pagetitle {
    margin: 0 0 2px; font-family: Georgia, "Palatino Linotype", serif;
    font-size: 30px; font-weight: 700; text-wrap: balance;
  }
  .idline { margin-bottom: 14px; }
  .badges { display: inline-flex; gap: 6px; margin-left: 10px; vertical-align: 3px; }
  .chip {
    display: inline-block; padding: 1px 8px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; letter-spacing: .04em;
    background: var(--panel2); color: var(--ink-soft); border: 1px solid var(--line);
  }
  .chip.live { background: var(--live-bg); color: var(--live); border-color: transparent; }
  .chip.warn { background: var(--warn-bg); color: var(--warn); border-color: transparent; }
  .chip.edited { background: var(--edit-bg); color: var(--edit); border-color: transparent; }
  .chip.t0 { color: var(--t0); } .chip.t1 { color: var(--t1); }
  .chip.t2 { color: var(--t2); } .chip.t3 { color: var(--t3); }

  .statgrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
    gap: 8px; margin: 14px 0 4px;
  }
  .stat {
    background: var(--card); border: 1px solid var(--line); border-radius: 5px;
    padding: 7px 10px; box-shadow: var(--shadow);
  }
  .stat .k { font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-faint); }
  .stat .v { font-size: 17px; font-variant-numeric: tabular-nums; }
  .stat .v small { font-size: 12px; color: var(--ink-soft); }
  .notes { color: var(--ink-soft); font-style: italic; margin: 10px 0 0; max-width: 65ch; }
  .assetline { margin: 12px 0 0; font-size: 13.5px; display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .assetline .k { font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-faint); }
  .assetline a { word-break: break-all; }
  .assetline .none { color: var(--ink-faint); font-style: italic; }

  /* Inline-editable item properties (the profile IS the editor) */
  .props { margin: 14px 0 4px; }
  .propgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  .pfield { display: flex; flex-direction: column; gap: 3px; }
  .pfield.wide { grid-column: 1 / -1; }
  .pfield > span { font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-faint); }
  .pfield input {
    width: 100%; padding: 6px 9px; border: 1px solid var(--line); border-radius: 5px;
    background: var(--card); color: var(--ink); font: inherit; font-size: 15px;
    font-variant-numeric: tabular-nums; box-shadow: var(--shadow);
  }
  .pfield input:hover { border-color: var(--ink-faint); }
  .pfield input:focus { border-color: var(--accent); }
  .props .assetopen { margin-top: 6px; font-size: 13px; }
  .savehint { color: var(--ink-faint); font-size: 11.5px; font-style: italic; margin-top: 8px; }

  /* Zombie idea board — freeform name + notes cards */
  .navspecial {
    display: flex; align-items: center; padding: 6px 6px; margin-top: 2px;
    border-radius: 4px; font-size: 13px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: var(--accent); border-top: 1px solid var(--line);
  }
  .navspecial:hover { background: var(--panel2); text-decoration: none; }
  .navspecial .n { margin-left: auto; color: var(--ink-faint); font-weight: 400; font-variant-numeric: tabular-nums; }
  .ideacard {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    padding: 12px 14px; margin-bottom: 10px; box-shadow: var(--shadow);
  }
  .idearow { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
  .ideaname, .ideanotes {
    padding: 8px 10px; border: 1px solid var(--line); border-radius: 5px;
    background: var(--bg); color: var(--ink); font: inherit;
  }
  .ideaname { flex: 1; min-width: 0; font-size: 16px; font-weight: 600; }
  .ideanotes { width: 100%; font-size: 15px; line-height: 1.5; resize: vertical; }
  .ideaname:focus, .ideanotes:focus { border-color: var(--accent); outline: none; }

  section.linkblock { margin-top: 26px; }
  section.linkblock > h3 {
    display: flex; align-items: baseline; gap: 10px;
    margin: 0 0 8px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-soft); border-bottom: 1px solid var(--line); padding-bottom: 4px;
  }
  section.linkblock > h3 .grow { flex: 1; }
  .autonote { font-size: 11.5px; letter-spacing: 0; text-transform: none; color: var(--ink-faint); font-weight: 400; }
  .empty { color: var(--ink-faint); font-size: 13.5px; font-style: italic; }

  .rcard {
    background: var(--card); border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 5px; padding: 10px 14px; margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .rcard .rhead { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .rcard .rname { font-weight: 600; }
  .rcard .meta { color: var(--ink-faint); font-size: 12.5px; }
  .rcard .rhead .btn { margin-left: auto; }
  .rcard table.rin { border-collapse: collapse; margin-top: 6px; font-size: 14px; }
  .rcard table.rin td { padding: 2px 14px 2px 0; }
  .rcard table.rin td.q { text-align: right; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .rcard table.rin td.lbl { color: var(--ink-faint); vertical-align: top; text-transform: uppercase; font-size: 11px; letter-spacing: .06em; padding-right: 16px; white-space: nowrap; }
  .rcard .rout { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--line); font-size: 14px; }
  .qty { color: var(--ink-faint); font-size: 12px; font-variant-numeric: tabular-nums; }
  .missing { color: var(--warn); border-bottom: 1px dotted var(--warn); cursor: help; }

  table.list { border-collapse: collapse; width: 100%; font-size: 14px; }
  .tablewrap { overflow-x: auto; }
  table.list th {
    text-align: left; font-size: 11.5px; letter-spacing: .07em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 600; padding: 6px 10px 4px; border-bottom: 1px solid var(--line);
  }
  table.list td { padding: 5px 10px; border-bottom: 1px solid var(--line); font-variant-numeric: tabular-nums; }
  table.list tr:hover td { background: var(--panel2); }
  table.list td.num, table.list th.num { text-align: right; }

  .homegrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-top: 16px; }
  .homecard {
    background: var(--card); border: 1px solid var(--line); border-radius: 5px;
    padding: 12px 14px; box-shadow: var(--shadow); color: var(--ink); display: block;
  }
  .homecard:hover { border-color: var(--accent); text-decoration: none; }
  .homecard .cn { font-family: Georgia, serif; font-size: 17px; }
  .homecard .cd { color: var(--ink-faint); font-size: 12.5px; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .lede { color: var(--ink-soft); max-width: 68ch; margin: 6px 0 0; }

  /* Skill-tree build-out columns */
  .skillcols { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(250px, 1fr); gap: 12px; align-items: start; margin-top: 16px; padding-bottom: 10px; }
  .skillcol { background: var(--panel2); border: 1px solid var(--line); border-radius: 6px; padding: 11px 11px 13px; }
  .skillhd { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
  .skillname-in, .skilltag-in {
    border: 1px solid transparent; border-radius: 4px; background: transparent; color: var(--ink);
    font-family: inherit; padding: 2px 5px; margin: 0 -5px; width: calc(100% + 10px);
  }
  .skillname-in { font-family: Georgia, serif; font-size: 19px; }
  .skilltag-in { color: var(--ink-faint); font-size: 12px; }
  .skillname-in:hover, .skilltag-in:hover, .seed-in:hover { border-color: var(--line); }
  .skillname-in:focus, .skilltag-in:focus, .seed-in:focus { border-color: var(--accent); outline: none; background: var(--bg); }
  .skillseed { border-left: 3px solid var(--accent); padding: 2px 0 2px 9px; margin-bottom: 9px; }
  .seedrow { display: flex; align-items: flex-start; gap: 7px; margin: 3px 0; }
  .skillseed .sk { flex: 0 0 46px; padding-top: 4px; color: var(--ink-faint); text-transform: uppercase; font-size: 9.5px; letter-spacing: .06em; }
  .seed-in {
    flex: 1; min-width: 0; border: 1px solid transparent; border-radius: 4px; background: transparent;
    color: var(--ink-soft); font: inherit; font-size: 12px; line-height: 1.45; padding: 3px 5px; resize: vertical;
  }
  .skillnodes { margin-top: 9px; display: flex; flex-direction: column; gap: 7px; }
  .skillcol .ideacard { margin-bottom: 0; }
  .skillcol .empty { padding: 2px 0; }
  @media (max-width: 720px) { .skillcols { grid-auto-flow: row; grid-auto-columns: auto; } }

  .editform {
    background: var(--card); border: 1px solid var(--edit); border-radius: 5px;
    padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
  }
  .formgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .field label { display: block; font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 2px; }
  .field input, .field select {
    width: 100%; padding: 5px 8px; border: 1px solid var(--line); border-radius: 4px;
    background: var(--bg); color: var(--ink); font: inherit; font-size: 14px;
  }
  .field.wide { grid-column: 1 / -1; }
  .ingrows { margin: 10px 0; display: flex; flex-direction: column; gap: 6px; }
  .ingrow { display: flex; gap: 8px; align-items: center; }
  .ingrow select, .ingrow input { padding: 4px 8px; border: 1px solid var(--line); border-radius: 4px; background: var(--bg); color: var(--ink); font: inherit; font-size: 13.5px; }
  .ingrow select { flex: 1; min-width: 0; }
  .ingrow input.qtyin { width: 70px; }
  .ingrow input.tblin { flex: 1; min-width: 0; }
  .formactions { display: flex; gap: 8px; margin-top: 12px; }
  .formactions .danger { margin-left: auto; }
  .formtitle { font-weight: 600; margin-bottom: 10px; color: var(--edit); }

  .navtoggle { display: none; }
  @media (max-width: 720px) {
    /* Phone layout = ONE natural page scroll. The desktop app-shell (fixed
       height, independently-scrolling panes) nests a scroll inside the
       artifact viewer's own scroll — that was the stacked-scroll feel. Here
       we release the fixed height and let the document flow, so there's a
       single scrollbar. Items list and content behave like two tabs: exactly
       one is in the flow at a time (toggled by ☰ Items / ✕ Close). */
    html, body { height: auto; }
    body { display: block; }
    .frame { display: block; }
    header { position: sticky; top: 0; z-index: 30; padding: 10px 14px; gap: 6px 12px; }
    nav { width: 100%; max-height: none; overflow: visible; border-right: none; border-bottom: none; padding: 10px 14px; }
    main { overflow: visible; padding: 16px 14px 72px; }
    body:not(.nav-open) nav { display: none; }
    body.nav-open main { display: none; }
    .navtoggle { display: inline-block; order: -1; }
    header h1 { font-size: 19px; }
    .headright { width: 100%; margin-left: 0; }
    .pagetitle { font-size: 25px; }
    /* iOS Safari auto-zooms any focused input under 16px — pin every field to 16px */
    #search, .pfield input, .field input, .field select,
    .ingrow select, .ingrow input, .editform input, .editform select, .ideanotes { font-size: 16px; }
    /* editor rows: stack instead of overflowing a ~360px content column */
    .ingrow { flex-wrap: wrap; }
    .ingrow select, .ingrow input.tblin { flex: 1 1 100%; }
    .ingrow input.qtyin { flex: 1 1 64px; }
    /* finger-sized tap targets */
    .btn { padding: 9px 15px; }
    .btn.mini { padding: 7px 13px; font-size: 13px; }
    .navlist a { padding: 7px 6px; } /* easier to hit while scrolling the list */
    .propgrid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
  @media (prefers-reduced-motion: no-preference) {
    .inner { animation: fadein .15s ease-out; }
    @keyframes fadein { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
  }
</style>

<header>
  <button class="btn navtoggle" id="navtoggle" aria-expanded="false">☰ Items</button>
  <h1><a href="#home"><span class="malady">Malady</span> — Item Web</a></h1>
  <span class="tagline">Malady Master Doc</span>
  <div class="headright">
    <span id="counts"></span>
    <span class="chip edited" id="editchip" hidden></span>
    <button class="btn mini" id="exportbtn" hidden>Export changes</button>
    <button class="btn mini danger" id="discardbtn" hidden>Discard</button>
  </div>
</header>
<div class="frame">
  <nav>
    <input id="search" type="search" placeholder="Search items, ids, recipes…" aria-label="Search items">
    <div id="navtree"></div>
  </nav>
  <main><div class="inner" id="page"></div></main>
</div>

  const d = SKILL_COLS[k], base = (DATA.skillMeta || {})[k] || {}, ov = EDITS.skillMeta[k] || {};
  const pick = f => (ov[f] != null ? ov[f] : (base[f] != null ? base[f] : d[f]));
  return { label: pick("label"), tag: pick("tag"), melee: pick("melee"), ranged: pick("ranged"), domain: pick("domain") };
}
const SKILL_COL_ORDER = Object.keys(SKILL_COLS);
for (const k of SKILL_COL_ORDER) {
  Object.assign(SKILL_COLS[k], {
    idPrefix: "skill_" + k + "_",
    namePh: "Node — perk, weapon tier, ability…",
    notesPh: "What it does · ranks · requirements · thoughts…"
  });
}
// Every board (free idea boards + skill columns) shares EDITS.ideaBoards
// storage and the same edit/rebuild/count loops. Only IDEA_BOARD_ORDER gets a
// standalone nav link + home card; the skill columns live together on #skills.
const BOARDS = { ...IDEA_BOARDS, ...SKILL_COLS };
const BOARD_ORDER = [...IDEA_BOARD_ORDER, ...SKILL_COL_ORDER];

function loadEdits() {
  let e = null;
  try { e = JSON.parse(localStorage.getItem(LS_KEY)); } catch (err) {}
  if (!e || !e.items) e = { items: {}, recipes: {}, deletedRecipes: [], stats: {}, loot: {} };
  // Migrate the single flat idea board -> board-keyed maps.
  if (e.ideas && !e.ideaBoards) e.ideaBoards = { zombie: e.ideas };
  if (Array.isArray(e.deletedIdeas)) e.deletedIdeas = { zombie: e.deletedIdeas };
  delete e.ideas;
  e.ideaBoards = e.ideaBoards || {};
  e.deletedIdeas = (e.deletedIdeas && !Array.isArray(e.deletedIdeas)) ? e.deletedIdeas : {};
  for (const b of BOARD_ORDER) { e.ideaBoards[b] = e.ideaBoards[b] || {}; e.deletedIdeas[b] = e.deletedIdeas[b] || []; }
  e.skillMeta = e.skillMeta || {};
  return e;
}
let EDITS = loadEdits();
function persist() { localStorage.setItem(LS_KEY, JSON.stringify(EDITS)); refreshHead(); }
function editCount() {
  let ideaEdits = 0;
  for (const b of BOARD_ORDER) ideaEdits += Object.keys(EDITS.ideaBoards[b]).length + EDITS.deletedIdeas[b].length;
  return Object.keys(EDITS.items).length + Object.keys(EDITS.recipes).length +
    Object.keys(EDITS.stats).length + Object.keys(EDITS.loot).length + EDITS.deletedRecipes.length +
    Object.keys(EDITS.skillMeta).length + ideaEdits;
}

let items, byId, recipes, recipeById, loot, statsById, madeBy, usedIn, lootedFrom, stations, containers, ideasByBoard;
function push(map, k, v) { if (!map.has(k)) map.set(k, []); map.get(k).push(v); }
function rebuild() {
  const im = new Map(DATA.items.map(i => [i.id, i]));
  for (const [id, it] of Object.entries(EDITS.items)) im.set(id, it);
  byId = im; items = [...im.values()];
  const rm = new Map(DATA.recipes.map(r => [r.id, r]));
  for (const [id, r] of Object.entries(EDITS.recipes)) rm.set(id, r);
  for (const id of EDITS.deletedRecipes) rm.delete(id);
  recipeById = rm; recipes = [...rm.values()];
  const lm = new Map();
  for (const l of DATA.loot) push(lm, l.item, l);
  for (const [iid, rows] of Object.entries(EDITS.loot)) lm.set(iid, rows.map(r => ({ ...r, item: iid })));
  loot = [];
  for (const rows of lm.values()) loot.push(...rows);
  statsById = new Map((DATA.stats || []).map(s => [s.id, s]));
  for (const [id, s] of Object.entries(EDITS.stats)) statsById.set(id, s);
  madeBy = new Map(); usedIn = new Map(); lootedFrom = new Map();
  for (const r of recipes) {
    if (r.out) push(madeBy, r.out, r);
    else if (r.places) push(madeBy, r.places, r); // craft-to-place: shows on the workstation item's page
    for (const inp of r.inputs) push(usedIn, inp.id, r);
  }
  for (const l of loot) push(lootedFrom, l.item, l);
  stations = [...new Set(recipes.flatMap(r => [r.station, r.places]).filter(Boolean))].sort();
  containers = [...new Set(loot.map(l => l.table))].sort();
  ideasByBoard = {};
  const boardData = DATA.ideaBoards || {};
  for (const b of BOARD_ORDER) {
    const raw = boardData[b];
    const seed = Array.isArray(raw) ? raw : (raw ? [raw] : []); // PS5.1 can emit a 1-row board as an object
    const idm = new Map(seed.map(i => [i.id, i]));
    for (const [id, v] of Object.entries(EDITS.ideaBoards[b])) idm.set(id, v);
    for (const id of EDITS.deletedIdeas[b]) idm.delete(id);
    ideasByBoard[b] = [...idm.values()];
  }
}

const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const num = v => { const n = parseFloat(v); return isFinite(n) ? n : 0; };

function itemLink(id, qty) {
  const it = byId.get(id);
  const q = qty ? ` <span class="qty">×${qty}</span>` : "";
  if (!it) return `<span class="missing" title="id not defined — fix or create the item">${esc(id)}</span>${q}`;
  return `<a href="#item/${esc(id)}">${esc(it.name)}</a>${q}`;
}
function tierChip(t) { return `<span class="chip t${t}">Tier ${t}</span>`; }
function statusChip(entity, kind) {
  const edited = kind === "item" ? EDITS.items[entity.id] : kind === "recipe" ? EDITS.recipes[entity.id] : null;
  if (edited) return '<span class="chip edited">edited</span>';
  return entity.live ? '<span class="chip live">LIVE</span>' : '<span class="chip">draft</span>';
}

function itemOptions(selected) {
  let html = "";
  for (const cat of CAT_ORDER) {
    const list = items.filter(i => i.cat === cat);
    if (!list.length) continue;
    html += `<optgroup label="${esc(CAT_LABELS[cat])}">` + list.map(i =>
      `<option value="${esc(i.id)}"${i.id === selected ? " selected" : ""}>${esc(i.name)}</option>`).join("") + `</optgroup>`;
  }
  return html;
}

/* ---------- edit drafts ---------- */
let draft = null;

function setDraftField(path, value) {
  const parts = path.split(".");
  let obj = draft;
  for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
  obj[parts[parts.length - 1]] = value;
}

function recipeCard(r, editable) {
  if (draft && draft.kind === "recipe" && draft.editId === r.id) return recipeForm();
  const stnName = r.station ? (byId.get(r.station)?.name || r.station) : "";
  const stn = r.station ? `<a href="#station/${esc(r.station)}" class="chip">${esc(stnName)}</a>` : `<span class="chip">by hand</span>`;
  const rows = r.inputs.map(i => `<tr><td>${itemLink(i.id)}</td><td class="q">${i.qty}</td></tr>`).join("");
  const out = r.places
    ? `<span class="chip">places: ${esc(r.places)}</span>`
    : itemLink(r.out, r.outQty > 1 ? r.outQty : 0);
  return `<div class="rcard">
    <div class="rhead"><span class="rname">${esc(r.name)}</span>${stn}
      <span class="meta">${r.secs}s</span>${statusChip(r, "recipe")}
      ${r.notes ? `<span class="meta">— ${esc(r.notes)}</span>` : ""}
      ${editable ? `<button class="btn mini" data-action="edit-recipe" data-rid="${esc(r.id)}">Edit</button>` : ""}</div>
    <table class="rin">${rows}</table>
    <div class="rout">→ ${out}</div>
  </div>`;
}

function recipeForm() {
  const d = draft;
  const ingRows = d.inputs.map((inp, idx) => `
    <div class="ingrow">
      <select data-dfield="inputs.${idx}.id">${itemOptions(inp.id)}</select>
      <input class="qtyin" type="number" min="1" value="${inp.qty}" data-dfield="inputs.${idx}.qty" aria-label="quantity">
      <button class="btn mini danger" data-action="del-ing" data-idx="${idx}">×</button>
    </div>`).join("");
  return `<div class="editform">
    <div class="formtitle">${d.editId ? "Edit recipe" : "New recipe"} — makes ${esc(byId.get(d.out)?.name || d.out)}</div>
    <div class="formgrid">
      <div class="field"><label>Recipe name</label><input value="${esc(d.name)}" data-dfield="name"></div>
      <div class="field"><label>Station</label><select data-dfield="station">
        <option value="">by hand</option>${workstationItems().map(w => `<option value="${esc(w.id)}"${w.id === d.station ? " selected" : ""}>${esc(w.name)}</option>`).join("")}
      </select></div>
      <div class="field"><label>Craft seconds</label><input type="number" min="1" value="${d.secs}" data-dfield="secs"></div>
      <div class="field"><label>Output qty</label><input type="number" min="1" value="${d.outQty}" data-dfield="outQty"></div>
      <div class="field wide"><label>Notes</label><input value="${esc(d.notes)}" data-dfield="notes"></div>
    </div>
    <div class="ingrows">${ingRows}</div>
    <button class="btn mini" data-action="add-ing">+ ingredient</button>
    <div class="formactions">
      <button class="btn primary" data-action="save-recipe">Save</button>
      <button class="btn" data-action="cancel-edit">Cancel</button>
      ${d.editId ? `<button class="btn danger" data-action="del-recipe">Delete recipe</button>` : ""}
    </div>
  </div>`;
}

function lootSection(itemId) {
  if (draft && draft.kind === "loot" && draft.itemId === itemId) return lootForm();
  const lf = lootedFrom.get(itemId) || [];
  const totals = {};
  for (const l of loot) totals[l.table] = (totals[l.table] || 0) + l.weight;
  if (!lf.length) return '<p class="empty">Not distributed anywhere yet — hit Edit and put it in a container.</p>';
  return `<div class="tablewrap"><table class="list">
    <tr><th>Container</th><th class="num">Weight</th><th class="num">Roll chance</th><th class="num">Qty</th><th class="num">Min gamestage</th></tr>
    ${lf.map(l => `<tr><td>${esc(l.table)}</td><td class="num">${l.weight}</td>
      <td class="num">${totals[l.table] ? Math.round(l.weight / totals[l.table] * 100) : 0}%</td>
      <td class="num">${l.min}–${l.max}</td><td class="num">${l.gs}</td></tr>`).join("")}
  </table></div>`;
}

function lootForm() {
  const d = draft;
  const rows = d.rows.map((r, idx) => `
    <div class="ingrow">
      <input class="tblin" list="containers" value="${esc(r.table)}" placeholder="container id" data-dfield="rows.${idx}.table">
      <input class="qtyin" type="number" min="1" value="${r.weight}" title="weight" data-dfield="rows.${idx}.weight">
      <input class="qtyin" type="number" min="0" value="${r.min}" title="min qty" data-dfield="rows.${idx}.min">
      <input class="qtyin" type="number" min="0" value="${r.max}" title="max qty" data-dfield="rows.${idx}.max">
      <input class="qtyin" type="number" min="0" value="${r.gs}" title="min gamestage" data-dfield="rows.${idx}.gs">
      <button class="btn mini danger" data-action="del-lootrow" data-idx="${idx}">×</button>
    </div>`).join("");
  return `<div class="editform">
    <div class="formtitle">Distribution — container / weight / min qty / max qty / min gamestage</div>
    <datalist id="containers">${containers.map(c => `<option value="${esc(c)}">`).join("")}</datalist>
    <div class="ingrows">${rows || '<p class="empty">No rows — add one.</p>'}</div>
    <button class="btn mini" data-action="add-lootrow">+ container</button>
    <div class="formactions">
      <button class="btn primary" data-action="save-loot">Save</button>
      <button class="btn" data-action="cancel-edit">Cancel</button>
    </div>
  </div>`;
}

function equipStatsSection(it) {
  if (draft && draft.kind === "stats" && draft.itemId === it.id) return statsForm(it);
  const s = statsById.get(it.id);
  if (!s) return '<p class="empty">No stats yet — hit Edit to set them.</p>';
  const ranged = it.cat === "weapon_ranged";
  let cells = "";
  if (it.cat !== "armor") {
    cells += statCell("Damage", s.dmg);
    cells += statCell(ranged ? "Rounds / min" : "Swings / min", s.apm);
  }
  if (it.cat === "armor") cells += statCell("Armor rating", s.armor);
  cells += statCell("Durability", s.dur);
  if ((it.cat === "tool" || it.cat === "weapon_melee") && s.harvest) cells += statCell("Harvest power", s.harvest);
  return `<div class="statgrid">${cells}</div>${s.notes ? `<p class="notes">${esc(s.notes)}</p>` : ""}`;
}

function statsForm(it) {
  const d = draft, ranged = it.cat === "weapon_ranged", armor = it.cat === "armor";
  return `<div class="editform">
    <div class="formtitle">Edit stats — ${esc(it.name)}</div>
    <div class="formgrid">
      ${armor ? "" : `<div class="field"><label>Damage</label><input type="number" min="0" value="${d.dmg}" data-dfield="dmg"></div>
      <div class="field"><label>${ranged ? "Rounds / min" : "Swings / min"}</label><input type="number" min="0" value="${d.apm}" data-dfield="apm"></div>`}
      ${armor ? `<div class="field"><label>Armor rating</label><input type="number" min="0" value="${d.armor}" data-dfield="armor"></div>` : ""}
      <div class="field"><label>Durability</label><input type="number" min="0" value="${d.dur}" data-dfield="dur"></div>
      ${(it.cat === "tool" || it.cat === "weapon_melee") ? `<div class="field"><label>Harvest power</label><input type="number" min="0" value="${d.harvest}" data-dfield="harvest"></div>` : ""}
      <div class="field wide"><label>Notes</label><input value="${esc(d.notes)}" data-dfield="notes"></div>
    </div>
    <div class="formactions">
      <button class="btn primary" data-action="save-stats">Save</button>
      <button class="btn" data-action="cancel-edit">Cancel</button>
    </div>
  </div>`;
}

function itemForm() {
  const d = draft;
  return `<div class="editform">
    <div class="formtitle">${d.editId ? "Edit item" : "New item"} — ${esc(CAT_LABELS[d.cat])}</div>
    <div class="formgrid">
      <div class="field wide"><label>Display name</label><input value="${esc(d.name)}" data-dfield="name"></div>
      <div class="field"><label>Tier (0–3)</label><input type="number" min="0" max="3" value="${d.tier}" data-dfield="tier"></div>
      <div class="field"><label>Stack size</label><input type="number" min="1" value="${d.stack}" data-dfield="stack"></div>
      <div class="field"><label>Weight kg</label><input type="number" min="0" step="0.1" value="${d.weight}" data-dfield="weight"></div>
      <div class="field"><label>Scrap value</label><input type="number" min="0" value="${d.scrap}" data-dfield="scrap"></div>
      <div class="field"><label>Food restore</label><input type="number" step="1" value="${d.food}" data-dfield="food"></div>
      <div class="field"><label>Water restore</label><input type="number" step="1" value="${d.water}" data-dfield="water"></div>
      <div class="field"><label>Health restore</label><input type="number" step="1" value="${d.health}" data-dfield="health"></div>
      <div class="field wide"><label>Notes</label><input value="${esc(d.notes)}" data-dfield="notes"></div>
      <div class="field wide"><label>Asset link (Fab / store URL, or /Game/… content path)</label><input value="${esc(d.asset)}" placeholder="https://…  or  /Game/Malady/…" data-dfield="asset"></div>
    </div>
    <div class="formactions">
      <button class="btn primary" data-action="save-item">Save</button>
      <button class="btn" data-action="cancel-edit">Cancel</button>
    </div>
  </div>`;
}

function statCell(k, v, unit) {
  return `<div class="stat"><div class="k">${k}</div><div class="v">${v}${unit ? ` <small>${unit}</small>` : ""}</div></div>`;
}

// The profile's core properties, editable in place. Every input auto-saves the
// moment you leave it (change event) — no Save button, no modal. The big
// category list is a read-only mirror of exactly these values.
function propsPanel(it) {
  const consumable = ["food", "drink", "medical"].includes(it.cat) || it.food || it.water || it.health;
  const p = (key, label, attrs) => `<label class="pfield"><span>${label}</span><input ${attrs} value="${esc(it[key] ?? 0)}" data-prop="${key}"></label>`;
  const isUrl = /^https?:\/\//i.test((it.asset || "").trim());
  return `<div class="props">
    <div class="propgrid">
      <label class="pfield"><span>Display name</span><input value="${esc(it.name)}" data-prop="name"></label>
      ${p("tier", "Tier", 'type="number" min="0" max="3"')}
      ${p("stack", "Stack", 'type="number" min="1"')}
      ${p("weight", "Weight kg", 'type="number" min="0" step="0.1"')}
      ${p("scrap", "Scrap value", 'type="number" min="0"')}
      ${consumable ? p("food", "Food", 'type="number"') + p("water", "Water", 'type="number"') + p("health", "Health", 'type="number"') : ""}
    </div>
    <div class="propgrid" style="margin-top:8px">
      <label class="pfield wide"><span>Notes</span><input value="${esc(it.notes || "")}" data-prop="notes"></label>
      <label class="pfield wide"><span>Asset link (Fab / store URL, or /Game/… content path)</span><input value="${esc(it.asset || "")}" placeholder="https://…  or  /Game/Malady/…" data-prop="asset"></label>
    </div>
    ${isUrl ? `<div class="assetopen"><a href="${esc(it.asset)}" target="_blank" rel="noopener">open asset ↗</a></div>` : ""}
    <p class="savehint">Changes save automatically to your browser as you leave each field — export when you're done.</p>
  </div>`;
}

// Scrap yield: what one of this item breaks down into. A table like a recipe,
// but reversed — inputs are this item, outputs are the salvage.
function scrapSection(it) {
  if (draft && draft.kind === "scrap" && draft.itemId === it.id) return scrapForm();
  const y = it.scrapYield || [];
  if (!y.length) return '<p class="empty">Scrapping this yields nothing yet — hit Edit to add salvage materials.</p>';
  const rows = y.map(s => `<tr><td>${itemLink(s.id)}</td><td class="q">${s.qty}</td></tr>`).join("");
  return `<div class="rcard"><table class="rin">${rows}</table></div>`;
}

function scrapForm() {
  const d = draft;
  const rows = d.rows.map((s, idx) => `
    <div class="ingrow">
      <select data-dfield="rows.${idx}.id">${itemOptions(s.id)}</select>
      <input class="qtyin" type="number" min="1" value="${s.qty}" data-dfield="rows.${idx}.qty" aria-label="quantity">
      <button class="btn mini danger" data-action="del-scraprow" data-idx="${idx}">×</button>
    </div>`).join("");
  return `<div class="editform">
    <div class="formtitle">Scraps into — the materials you get back</div>
    <div class="ingrows">${rows || '<p class="empty">No yield rows — add one.</p>'}</div>
    <button class="btn mini" data-action="add-scraprow">+ material</button>
    <div class="formactions">
      <button class="btn primary" data-action="save-scrap">Save</button>
      <button class="btn" data-action="cancel-edit">Cancel</button>
    </div>
  </div>`;
}

function scrapSummary(it) {
  const y = it.scrapYield || [];
  if (!y.length) return '<span style="color:var(--ink-faint)">—</span>';
  return y.map(s => `${esc(byId.get(s.id)?.name || s.id)}${s.qty > 1 ? " ×" + s.qty : ""}`).join(", ");
}

/* ---------- pages ---------- */
function renderItem(id) {
  const it = byId.get(id);
  if (!it) return `<p class="empty">No item with id <code>${esc(id)}</code>.</p>`;
  const mb = madeBy.get(id) || [], ui = usedIn.get(id) || [];
  const newRecipeForm = draft && draft.kind === "recipe" && !draft.editId && draft.out === id ? recipeForm() : "";
  return `
    <div class="crumb"><a href="#cat/${esc(it.cat)}">${esc(CAT_LABELS[it.cat] || it.cat)}</a></div>
    <h2 class="pagetitle"><span id="ititle">${esc(it.name)}</span>
      <span class="badges"><span id="istatus">${statusChip(it, "item")}</span></span>
    </h2>
    <div class="idline"><span class="id">${esc(it.id)}</span></div>
    ${propsPanel(it)}
    <section class="linkblock"><h3>Scraps into <span class="autonote">what you get back when you scrap it</span><span class="grow"></span>
      ${draft && draft.kind === "scrap" && draft.itemId === id ? "" : `<button class="btn mini" data-action="edit-scrap">Edit</button>`}</h3>
      ${scrapSection(it)}</section>
    ${EQUIP_CATS.has(it.cat) ? `<section class="linkblock"><h3>Combat & gear stats <span class="grow"></span>
      ${draft && draft.kind === "stats" && draft.itemId === id ? "" : `<button class="btn mini" data-action="edit-stats">Edit</button>`}</h3>
      ${equipStatsSection(it)}</section>` : ""}
    ${it.cat === "workstation" ? `<section class="linkblock"><h3>Recipes crafted here <span class="autonote">assign a recipe to this station from any item's recipe editor</span></h3>
      ${(() => { const here = recipes.filter(r => r.station === id); return here.length ? here.map(r => recipeCard(r, true)).join("") : '<p class="empty">No recipes assigned to this station yet.</p>'; })()}</section>` : ""}
    <section class="linkblock"><h3>Made by <span class="grow"></span>
      ${newRecipeForm ? "" : `<button class="btn mini" data-action="add-recipe">+ Add recipe</button>`}</h3>
      ${newRecipeForm}
      ${mb.length ? mb.map(r => recipeCard(r, true)).join("") : (newRecipeForm ? "" : '<p class="empty">No recipe makes this — harvested, looted, or waiting on a recipe.</p>')}</section>
    <section class="linkblock"><h3>Used in <span class="autonote">auto-filled from recipes — not editable</span></h3>
      ${ui.length ? ui.map(r => recipeCard(r, false)).join("") : '<p class="empty">Nothing uses this yet. Dead-end items are worth a recipe idea.</p>'}</section>
    <section class="linkblock"><h3>Distribution — looted from <span class="grow"></span>
      ${draft && draft.kind === "loot" && draft.itemId === id ? "" : `<button class="btn mini" data-action="edit-loot">Edit</button>`}</h3>
      ${lootSection(id)}</section>`;
}

function renderCat(cat) {
  const list = items.filter(i => i.cat === cat);
  const creating = draft && draft.kind === "item" && !draft.editId && draft.cat === cat;
  return `
    <div class="crumb"><a href="#home">All categories</a></div>
    <h2 class="pagetitle">${esc(CAT_LABELS[cat] || cat)}
      <span class="badges">${creating ? "" : `<button class="btn mini" data-action="new-item" data-cat="${esc(cat)}">+ New item</button>`}</span></h2>
    <p class="lede">${list.length} items · ${list.filter(i => i.live).length} live in the game today</p>
    ${creating ? itemForm() : ""}
    <div class="tablewrap"><table class="list">
      <tr><th>Item</th><th>Tier</th><th class="num">Stack</th><th class="num">Wt</th><th class="num">Scrap</th><th>Scraps into</th><th>Status</th><th>Notes</th></tr>
      ${list.map(i => `<tr>
        <td><a href="#item/${esc(i.id)}">${esc(i.name)}</a></td>
        <td>${i.tier}</td><td class="num">${i.stack}</td><td class="num">${i.weight}</td><td class="num">${i.scrap}</td>
        <td style="font-size:12.5px">${scrapSummary(i)}</td>
        <td>${statusChip(i, "item")}</td>
        <td style="color:var(--ink-faint);font-size:12.5px">${esc(i.notes)}</td></tr>`).join("")}
    </table></div>`;
}

function renderStation(stn) {
  const list = recipes.filter(r => r.station === stn);
  return `
    <div class="crumb"><a href="#home">Stations</a></div>
    <h2 class="pagetitle">${esc(stn)}</h2>
    <p class="lede">${list.length} recipes crafted here.</p>
    <section class="linkblock">${list.map(r => recipeCard(r, true)).join("")}</section>`;
}

function ideaCard(board, i) {
  const cfg = BOARDS[board];
  return `<div class="ideacard">
    <div class="idearow">
      <input class="ideaname" data-board="${board}" data-idea="${esc(i.id)}" data-field="name" value="${esc(i.name)}" placeholder="${esc(cfg.namePh)}">
      <button class="btn mini danger" data-action="del-idea" data-board="${board}" data-id="${esc(i.id)}">Delete</button>
    </div>
    <textarea class="ideanotes" data-board="${board}" data-idea="${esc(i.id)}" data-field="notes" rows="3"
      placeholder="${esc(cfg.notesPh)}">${esc(i.notes)}</textarea>
  </div>`;
}

function renderIdeas(board) {
  const cfg = IDEA_BOARDS[board];
  if (!cfg) return `<p class="empty">No such board.</p>`;
  const list = ideasByBoard[board] || [];
  return `
    <div class="crumb"><a href="#home">All categories</a></div>
    <h2 class="pagetitle">${esc(cfg.title)}
      <span class="badges"><button class="btn mini" data-action="new-idea" data-board="${board}">+ New idea</button></span></h2>
    <p class="lede">${esc(cfg.lede)}</p>
    ${list.length ? list.map(i => ideaCard(board, i)).join("") : '<p class="empty">No ideas yet. Hit “+ New idea” to add one.</p>'}`;
}

function renderSkills() {
  const seed = (k, field, label, rows) =>
    `<div class="seedrow"><span class="sk">${label}</span>` +
    `<textarea class="seed-in" data-skill="${k}" data-metafield="${field}" rows="${rows}">${esc(colMeta(k)[field])}</textarea></div>`;
  const cols = SKILL_COL_ORDER.map(k => {
    const m = colMeta(k);
    const nodes = ideasByBoard[k] || [];
    return `<div class="skillcol">
      <div class="skillhd">
        <input class="skillname-in" data-skill="${k}" data-metafield="label" value="${esc(m.label)}" placeholder="Attribute">
        <input class="skilltag-in" data-skill="${k}" data-metafield="tag" value="${esc(m.tag)}" placeholder="short archetype…">
      </div>
      <div class="skillseed">
        ${seed(k, "melee", "Melee", 1)}
        ${seed(k, "ranged", "Ranged", 2)}
        ${seed(k, "domain", "Domain", 2)}
      </div>
      <button class="btn mini" data-action="new-idea" data-board="${k}">+ Add node</button>
      <div class="skillnodes">${nodes.length ? nodes.map(n => ideaCard(k, n)).join("")
        : '<p class="empty">No nodes yet — hit “+ Add node” to start building.</p>'}</div>
    </div>`;
  }).join("");
  return `
    <div class="crumb"><a href="#home">All categories</a></div>
    <h2 class="pagetitle">Skill Trees <span class="badges"><span class="meta">${SKILL_COL_ORDER.length} trees</span></span></h2>
    <p class="lede">Six attribute trees plus a General catch-all for cross-cutting perks. Every field here is editable — the tree name, its archetype, and the <strong>melee</strong> / <strong>ranged</strong> / <strong>domain</strong> lines up top — then add <strong>nodes</strong> below for perks, weapon tiers, abilities, requirements, whatever. Each weapon line runs through three channels: the tree's <em>perk</em> buffs it, <em>proficiency</em> levels it through use, found <em>schematics</em> unlock its crafting tiers. Typing auto-saves to your browser; hit <strong>Export changes</strong> and send it back so your build-out lands with everyone else's. Design frame: PLAN-2 §2.2.</p>
    <div class="tablewrap"><div class="skillcols">${cols}</div></div>`;
}

function renderHome() {
  const liveN = items.filter(i => i.live).length;
  const deadEnds = items.filter(i => !usedIn.get(i.id) && !madeBy.get(i.id) && !lootedFrom.get(i.id)).length;
  return `
    <div class="statgrid" style="margin-top:4px">
      ${statCell("Items", items.length)}${statCell("Live today", liveN)}
      ${statCell("Recipes", recipes.length)}${statCell("Stations", stations.length)}
      ${statCell("Unconnected items", deadEnds)}${statCell("Your edits", editCount())}
    </div>
    <div class="homegrid">
      ${CAT_ORDER.filter(c => items.some(i => i.cat === c)).map(c => {
        const n = items.filter(i => i.cat === c);
        return `<a class="homecard" href="#cat/${c}"><div class="cn">${CAT_LABELS[c]}</div>
          <div class="cd">${n.length} items · ${n.filter(i => i.live).length} live</div></a>`;
      }).join("")}
      <a class="homecard" href="#skills"><div class="cn">Skill Trees</div>
        <div class="cd">${SKILL_COL_ORDER.length} trees · build them out</div></a>
      ${IDEA_BOARD_ORDER.map(b => { const n = (ideasByBoard[b] || []).length; return `<a class="homecard" href="#ideas/${b}"><div class="cn">${esc(IDEA_BOARDS[b].label)}</div>
        <div class="cd">${n} idea${n === 1 ? "" : "s"} · post your own</div></a>`; }).join("")}
    </div>`;
}

/* ---------- nav ---------- */
const navOpen = new Set();
function buildNav(filter) {
  const q = (filter || "").trim().toLowerCase();
  const match = i => !q || i.name.toLowerCase().includes(q) || i.id.includes(q) || i.cat.includes(q);
  let html = "";
  for (const cat of CAT_ORDER) {
    const list = items.filter(i => i.cat === cat && match(i));
    if (!list.length) continue;
    const open = q ? true : navOpen.has(cat);
    html += `<div class="navgroup">
      <button data-cat="${cat}">${CAT_LABELS[cat]} <span class="n">${list.length}</span></button>
      ${open ? `<ul class="navlist">${list.map(i =>
        `<li><a href="#item/${esc(i.id)}" data-id="${esc(i.id)}">${i.live ? '<span class="dotlive" title="live in build"></span>' : ""}${esc(i.name)}</a></li>`).join("")}</ul>` : ""}
    </div>`;
  }
  // Skill trees — reference view, pinned above the idea boards.
  if (!q || "skill trees".includes(q) || "attributes".includes(q)) {
    html += `<a class="navspecial" href="#skills">Skill Trees <span class="n">${SKILL_COL_ORDER.length}</span></a>`;
  }
  // Idea boards — not item categories, pinned at the bottom of the nav.
  for (const b of IDEA_BOARD_ORDER) {
    const cfg = IDEA_BOARDS[b];
    if (!q || cfg.label.toLowerCase().includes(q) || cfg.title.toLowerCase().includes(q)) {
      html += `<a class="navspecial" href="#ideas/${b}">${esc(cfg.label)} <span class="n">${(ideasByBoard[b] || []).length}</span></a>`;
    }
  }
  document.getElementById("navtree").innerHTML = html || '<p class="empty" style="padding:6px">No matches.</p>';
}

/* ---------- actions ---------- */
function slugify(name) { return name.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, ""); }
function uniqueId(base) {
  let id = base, n = 2;
  while (byId.has(id) || recipeById.has(id)) id = base + "_" + n++;
  return id;
}
function currentItemId() { return (location.hash.slice(1).split("/"))[1]; }
// Lazily promote an item into the edit set as a full copy, so inline property
// tweaks and scrap-table edits both merge into one override object per item.
function ensureItemEdit(id) {
  if (!EDITS.items[id]) {
    const it = byId.get(id);
    EDITS.items[id] = { ...it, scrapYield: (it.scrapYield || []).map(s => ({ ...s })) };
  }
  return EDITS.items[id];
}
function ensureIdeaEdit(board, id) {
  if (!EDITS.ideaBoards[board][id]) {
    const found = (ideasByBoard[board] || []).find(i => i.id === id) || { id, name: "", notes: "" };
    EDITS.ideaBoards[board][id] = { ...found };
  }
  return EDITS.ideaBoards[board][id];
}
function uniqueIdeaId(board) {
  const seen = new Set([...((DATA.ideaBoards || {})[board] || []).map(i => i.id), ...Object.keys(EDITS.ideaBoards[board])]);
  let n = 1, id;
  do { id = BOARDS[board].idPrefix + n++; } while (seen.has(id));
  return id;
}

const actions = {
  "new-idea"(el) {
    const board = el.dataset.board;
    const id = uniqueIdeaId(board);
    EDITS.ideaBoards[board][id] = { id, name: "", notes: "" };
    persist(); rebuild(); route();
    const nm = document.querySelector(`[data-idea="${id}"][data-field="name"]`);
    if (nm) nm.focus();
  },
  "del-idea"(el) {
    const board = el.dataset.board, id = el.dataset.id;
    if (!confirm("Delete this idea?")) return;
    delete EDITS.ideaBoards[board][id];
    if (((DATA.ideaBoards || {})[board] || []).some(i => i.id === id) && !EDITS.deletedIdeas[board].includes(id)) EDITS.deletedIdeas[board].push(id);
    persist(); rebuild(); route();
  },
  "new-item"(el) {
    draft = { kind: "item", editId: null, cat: el.dataset.cat, name: "", tier: 0, stack: 100,
      weight: 1, scrap: 0, food: 0, water: 0, health: 0, notes: "", asset: "" };
  },
  "save-item"() {
    const d = draft;
    if (!d.name.trim()) { alert("Name it first."); return; }
    const id = d.editId || uniqueId(CAT_PREFIX[d.cat] + slugify(d.name));
    const prev = byId.get(id);
    EDITS.items[id] = { id, name: d.name.trim(), cat: d.cat, tier: num(d.tier), stack: num(d.stack) || 1,
      weight: num(d.weight), scrap: num(d.scrap), food: num(d.food), water: num(d.water), health: num(d.health),
      live: prev ? prev.live : false, notes: d.notes, asset: (d.asset || "").trim(),
      scrapYield: prev ? (prev.scrapYield || []) : [] };
    draft = null; persist(); rebuild(); buildNav(searchBox.value);
    if (!location.hash.includes("#item/" + id)) location.hash = "#item/" + id; else route();
  },
  "edit-scrap"() {
    const id = currentItemId();
    const y = (byId.get(id).scrapYield || []).map(s => ({ id: s.id, qty: s.qty }));
    draft = { kind: "scrap", itemId: id, rows: y.length ? y : [{ id: "resource_scrap_iron", qty: 1 }] };
  },
  "add-scraprow"() { draft.rows.push({ id: "resource_scrap_iron", qty: 1 }); route(); },
  "del-scraprow"(el) { draft.rows.splice(+el.dataset.idx, 1); route(); },
  "save-scrap"() {
    const it = ensureItemEdit(draft.itemId);
    it.scrapYield = draft.rows.map(s => ({ id: s.id, qty: Math.max(1, num(s.qty)) })).filter(s => s.id);
    draft = null; persist(); rebuild(); route();
  },
  "edit-stats"() {
    const id = currentItemId();
    const s = statsById.get(id) || { dmg: 0, apm: 0, dur: 0, armor: 0, harvest: 0, notes: "" };
    draft = { kind: "stats", itemId: id, dmg: s.dmg, apm: s.apm, dur: s.dur, armor: s.armor, harvest: s.harvest, notes: s.notes || "" };
  },
  "save-stats"() {
    const d = draft;
    EDITS.stats[d.itemId] = { id: d.itemId, dmg: num(d.dmg), apm: num(d.apm), dur: num(d.dur),
      armor: num(d.armor), harvest: num(d.harvest), notes: d.notes };
    draft = null; persist(); rebuild(); route();
  },
  "add-recipe"() {
    const id = currentItemId();
    const it = byId.get(id);
    draft = { kind: "recipe", editId: null, out: id, name: it ? it.name : id, station: "", secs: 3,
      outQty: 1, inputs: [{ id: "resource_wood", qty: 1 }], notes: "" };
  },
  "edit-recipe"(el) {
    const r = recipeById.get(el.dataset.rid);
    draft = { kind: "recipe", editId: r.id, out: r.out, name: r.name, station: r.station, secs: r.secs,
      outQty: r.outQty || 1, inputs: r.inputs.map(i => ({ ...i })), notes: r.notes, places: r.places };
  },
  "add-ing"() { draft.inputs.push({ id: "resource_wood", qty: 1 }); route(); },
  "del-ing"(el) { draft.inputs.splice(+el.dataset.idx, 1); route(); },
  "save-recipe"() {
    const d = draft;
    const inputs = d.inputs.map(i => ({ id: i.id, qty: Math.max(1, num(i.qty)) })).filter(i => i.id);
    if (!inputs.length) { alert("A recipe needs at least one ingredient."); return; }
    const id = d.editId || uniqueId(slugify(d.name || d.out));
    const prev = recipeById.get(id);
    EDITS.recipes[id] = { id, name: d.name.trim() || id, station: d.station, secs: Math.max(1, num(d.secs)),
      inputs, out: d.places ? "" : d.out, outQty: Math.max(1, num(d.outQty)), places: d.places || "",
      live: prev ? prev.live : false, notes: d.notes };
    EDITS.deletedRecipes = EDITS.deletedRecipes.filter(x => x !== id);
    draft = null; persist(); rebuild(); route();
  },
  "del-recipe"() {
    const id = draft.editId;
    if (!confirm("Delete this recipe?")) return;
    delete EDITS.recipes[id];
    if (DATA.recipes.some(r => r.id === id) && !EDITS.deletedRecipes.includes(id)) EDITS.deletedRecipes.push(id);
    draft = null; persist(); rebuild(); route();
  },
  "edit-loot"() {
    const id = currentItemId();
    const rows = (lootedFrom.get(id) || []).map(l => ({ table: l.table, weight: l.weight, min: l.min, max: l.max, gs: l.gs }));
    draft = { kind: "loot", itemId: id, rows: rows.length ? rows : [{ table: containers[0] || "crate_household", weight: 1, min: 1, max: 1, gs: 0 }] };
  },
  "add-lootrow"() { draft.rows.push({ table: containers[0] || "crate_household", weight: 1, min: 1, max: 1, gs: 0 }); route(); },
  "del-lootrow"(el) { draft.rows.splice(+el.dataset.idx, 1); route(); },
  "save-loot"() {
    const d = draft;
    EDITS.loot[d.itemId] = d.rows
      .map(r => ({ table: String(r.table).trim(), weight: Math.max(1, num(r.weight)), min: Math.max(0, num(r.min)),
        max: Math.max(0, num(r.max)), gs: Math.max(0, num(r.gs)), live: false }))
      .filter(r => r.table);
    draft = null; persist(); rebuild(); route();
  },
  "cancel-edit"() { draft = null; route(); }
};

const OPENS_FORM = ["new-item", "edit-stats", "add-recipe", "edit-recipe", "edit-loot", "edit-scrap"];
document.getElementById("page").addEventListener("click", e => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const fn = actions[el.dataset.action];
  if (fn) { fn(el); if (OPENS_FORM.includes(el.dataset.action)) route(); }
});
document.getElementById("page").addEventListener("input", e => {
  const f = e.target.dataset.dfield;
  if (f && draft) setDraftField(f, e.target.value);
});
const NUM_PROPS = new Set(["tier", "stack", "weight", "scrap", "food", "water", "health"]);
function applyInlineProp(prop, value) {
  const id = currentItemId();
  if (!id) return;
  const it = ensureItemEdit(id);
  if (prop === "name") it.name = value.trim() || (byId.get(id)?.name || id);
  else if (prop === "asset") it.asset = value.trim();
  else if (NUM_PROPS.has(prop)) it[prop] = num(value);
  else it[prop] = value;
  persist(); rebuild(); buildNav(searchBox.value);
  // Focus-safe surgical updates — no full re-render, so tabbing between fields survives.
  const t = document.getElementById("ititle"); if (t && prop === "name") t.textContent = byId.get(id).name;
  const s = document.getElementById("istatus"); if (s) s.innerHTML = statusChip(byId.get(id), "item");
}
function applyIdeaField(board, id, field, value) {
  const idea = ensureIdeaEdit(board, id);
  idea[field] = value;
  persist(); rebuild(); buildNav(searchBox.value); // focus-safe: no full re-render
}
function applySkillMetaField(k, field, value) {
  if (!EDITS.skillMeta[k]) EDITS.skillMeta[k] = { ...colMeta(k) };
  EDITS.skillMeta[k][field] = value;
  persist(); // focus-safe: value already in the field, header isn't re-rendered
}
document.getElementById("page").addEventListener("change", e => {
  if (e.target.dataset.prop) { applyInlineProp(e.target.dataset.prop, e.target.value); return; }
  if (e.target.dataset.idea) { applyIdeaField(e.target.dataset.board, e.target.dataset.idea, e.target.dataset.field, e.target.value); return; }
  if (e.target.dataset.skill) { applySkillMetaField(e.target.dataset.skill, e.target.dataset.metafield, e.target.value); return; }
  const f = e.target.dataset.dfield;
  if (f && draft) setDraftField(f, e.target.value);
});

/* ---------- export / discard ---------- */
document.getElementById("exportbtn").addEventListener("click", () => {
  const payload = { schema: "malady-design-edits/1", exported: new Date().toISOString(),
    baseGenerated: DATA.generated, edits: EDITS };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "malady-design-edits.json";
  a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById("discardbtn").addEventListener("click", () => {
  if (!confirm("Throw away ALL local edits? (Anything already exported is safe.)")) return;
  EDITS = { items: {}, recipes: {}, deletedRecipes: [], stats: {}, loot: {}, ideaBoards: {}, deletedIdeas: {} };
  for (const b of IDEA_BOARD_ORDER) { EDITS.ideaBoards[b] = {}; EDITS.deletedIdeas[b] = []; }
  draft = null; persist(); rebuild(); buildNav(searchBox.value); route();
});

function refreshHead() {
  const n = editCount();
  const chip = document.getElementById("editchip");
  chip.hidden = !n; chip.textContent = n + (n === 1 ? " edit" : " edits");
  document.getElementById("exportbtn").hidden = !n;
  document.getElementById("discardbtn").hidden = !n;
}

/* ---------- routing ---------- */
document.getElementById("navtree").addEventListener("click", e => {
  const b = e.target.closest("button[data-cat]");
  if (!b) return;
  const c = b.dataset.cat;
  navOpen.has(c) ? navOpen.delete(c) : navOpen.add(c);
  buildNav(searchBox.value);
});
const searchBox = document.getElementById("search");
searchBox.addEventListener("input", e => buildNav(e.target.value));

function route() {
  const h = location.hash.slice(1) || "home";
  const page = document.getElementById("page");
  const [view, arg] = h.split("/");
  if (view === "item") { page.innerHTML = renderItem(arg); const it = byId.get(arg); if (it && !navOpen.has(it.cat)) { navOpen.add(it.cat); buildNav(searchBox.value); } }
  else if (view === "cat") page.innerHTML = renderCat(arg);
  else if (view === "station") page.innerHTML = renderStation(arg);
  else if (view === "ideas") page.innerHTML = renderIdeas(arg || IDEA_BOARD_ORDER[0]);
  else if (view === "skills") page.innerHTML = renderSkills();
  else page.innerHTML = renderHome();
  document.querySelectorAll(".navlist a").forEach(a => a.classList.toggle("active", a.dataset.id === arg && view === "item"));
}
const navToggleBtn = document.getElementById("navtoggle");
function setNavOpen(open) {
  document.body.classList.toggle("nav-open", open);
  navToggleBtn.setAttribute("aria-expanded", open ? "true" : "false");
  navToggleBtn.textContent = open ? "✕ Close" : "☰ Items";
  window.scrollTo(0, 0); // top of the single page scroll when switching "tabs"
}
window.addEventListener("hashchange", () => {
  draft = null; route();
  document.querySelector("main").scrollTop = 0; // desktop: main is the scroll container
  setNavOpen(false); // mobile: switch back to the content "tab" and scroll to top
});
navToggleBtn.addEventListener("click", () => setNavOpen(!document.body.classList.contains("nav-open")));

document.getElementById("counts").textContent =
  `${DATA.items.length} items · ${DATA.recipes.length} recipes · generated ${DATA.generated}`;
rebuild();
refreshHead();
buildNav("");
route();
</script>
